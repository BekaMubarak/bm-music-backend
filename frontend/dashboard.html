<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BM MUSIC STREAMING - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .dashboard-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Left Navigation Sidebar */
    .sidebar {
      width: 260px;
      background-color: var(--bg-card);
      border-right: 1px solid rgba(0, 240, 255, 0.1);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .logo h2 {
      font-size: 1.5rem;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }
    .nav-links {
      list-style: none;
    }
    .nav-links li {
      margin-bottom: 20px;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--neon-blue);
      text-shadow: 0 0 8px var(--neon-blue);
    }

    /* Main Scrolling Content Window */
    .content-area {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
      padding-bottom: 120px; /* Leave space so bottom player bar doesn't block songs */
    }
    .search-bar {
      width: 100%;
      max-width: 500px;
      padding: 12px 20px;
      background: #121420;
      border: 1px solid #2a2f4c;
      border-radius: 30px;
      color: var(--text-main);
      font-size: 1rem;
      margin-bottom: 40px;
    }
    .search-bar:focus {
      outline: none;
      border-color: var(--neon-blue);
    }
    .section-title {
      font-size: 1.8rem;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .song-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 24px;
    }
    .song-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s;
    }
    .song-card:hover {
      transform: translateY(-5px);
      border-color: var(--neon-pink);
    }
    .song-cover {
      width: 100%;
      aspect-ratio: 1;
      background: #1d2033;
      border-radius: 8px;
      margin-bottom: 14px;
      object-fit: cover;
    }
    .song-title {
      font-size: 1rem;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-artist {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Fixed Bottom Audio Music Player Bar */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: #0d0f1a;
      border-top: 1px solid rgba(255, 42, 116, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 100;
    }
    .current-track-info {
      display: flex;
      align-items: center;
      width: 25%;
    }
    .player-cover {
      width: 55px;
      height: 55px;
      background: #1a1d2e;
      border-radius: 6px;
      margin-right: 14px;
    }
    .player-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50%;
    }
    .control-buttons {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 8px;
    }
    .control-btn {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .play-btn {
      font-size: 2rem;
      color: var(--neon-blue);
    }
    .progress-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: #252942;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-filled {
      width: 35%;
      height: 100%;
      background: var(--neon-pink);
      border-radius: 2px;
    }
    .volume-controls {
      width: 25%;
      display: flex;
      justify-content: flex-end;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div>
        <div class="logo">
          <h2>BM <span class="blue-glow">MUSIC</span></h2>
        </div>
        <ul class="nav-links">
          <li><a href="#" class="active">Discover</a></li>
          <li><a href="#">Search</a></li>
          <li><a href="#">Playlists</a></li>
          <li><a href="#">Favorites</a></li>
        </ul>
      </div>
      <div>
        <button class="neon-button" style="width: 100%; padding: 8px;" onclick="window.location.href='index.html'">Log Out</button>
      </div>
    </aside>

    <main class="content-area">
      <input type="text" class="search-bar" placeholder="Search for tracks, artists, genres...">
      
      <h3 class="section-title">Trending <span class="pink-glow">Releases</span></h3>
      
      <div class="song-grid" id="dashboard-song-grid">
        <div class="song-card">
          <div class="song-cover" style="background: linear-gradient(45deg, #ff2a74, #00f0ff);"></div>
          <div class="song-title">Sample Track Title</div>
          <div class="song-artist">Chabike</div>
        </div>
        <div class="song-card">
          <div class="song-cover" style="background: linear-gradient(135deg, #00f0ff, #7000ff);"></div>
          <div class="song-title">Dancehall Vibes</div>
          <div class="song-artist">BM Cyber</div>
        </div>
      </div>
    </main>
  </div>

  <footer class="player-bar">
    <div class="current-track-info">
      <div class="player-cover" style="background: linear-gradient(45deg, #ff2a74, #00f0ff);"></div>
      <div>
        <div class="song-title" id="player-title">No Track Selected</div>
        <div class="song-artist" id="player-artist">Choose a song to stream</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="control-buttons">
        <button class="control-btn">⏮</button>
        <button class="control-btn play-btn">▶</button>
        <button class="control-btn">⏭</button>
      </div>
      <div class="progress-container">
        <span>1:12</span>
        <div class="progress-bar">
          <div class="progress-filled"></div>
        </div>
        <span>3:45</span>
      </div>
    </div>

    <div class="volume-controls">
      <span>🔊 75%</span>
    </div>
  </footer>

</body>
</html>
