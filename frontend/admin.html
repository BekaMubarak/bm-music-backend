<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BM MUSIC STREAMING - Admin Control</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }
    .admin-header {
      margin-bottom: 40px;
      text-align: center;
    }
    /* Stat Counter Grid Cards */
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 42, 116, 0.1);
      padding: 24px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-number {
      font-size: 2.5rem;
      font-weight: bold;
      margin-top: 10px;
    }

    /* Queue Table layout */
    .approval-section {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 30px;
      border: 1px solid rgba(0, 240, 255, 0.1);
    }
    .approval-section h3 {
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    .track-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .track-table th, .track-table td {
      padding: 14px;
      border-bottom: 1px solid #1a1d2e;
    }
    .track-table th {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    .action-btn {
      padding: 6px 14px;
      font-size: 0.85rem;
      border-color: var(--neon-pink);
      text-shadow: 0 0 4px var(--neon-pink);
    }
    .action-btn:hover {
      background: var(--neon-pink);
      box-shadow: 0 0 10px var(--neon-pink);
    }
  </style>
</head>
<body>

  <div class="admin-container">
    <div class="admin-header">
      <h2>SYSTEM <span class="pink-glow">ADMINISTRATION</span> CONTROL</h2>
      <p style="color: var(--text-muted); margin-top: 5px;">Platform Analytics & Music Quality Assurance Review</p>
    </div>

    <div class="analytics-grid">
      <div class="stat-card">
        <div style="color: var(--text-muted);">Total Streams</div>
        <div class="stat-number blue-glow" id="stat-streams">0</div>
      </div>
      <div class="stat-card">
        <div style="color: var(--text-muted);">Registered Creators</div>
        <div class="stat-number pink-glow" id="stat-artists">0</div>
      </div>
      <div class="stat-card">
        <div style="color: var(--text-muted);">Active Listeners</div>
        <div class="stat-number" id="stat-listeners">0</div>
      </div>
    </div>

    <div class="approval-section">
      <h3>Tracks Awaiting <span class="blue-glow">Validation</span></h3>
      
      <table class="track-table">
        <thead>
          <tr>
            <th>Track Name</th>
            <th>Artist</th>
            <th>Genre</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="admin-pending-list">
          <tr>
            <td>Sample Demo Track</td>
            <td>Chabike</td>
            <td>Dancehall</td>
            <td><button class="neon-button action-btn" onclick="approveTrackPlaceholder(this)">APPROVE LIVE</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function approveTrackPlaceholder(button) {
      alert("Verification loop active! Pushing live streaming permission status to data collection array.");
      const row = button.closest('tr');
      row.remove();
    }
  </script>
</body>
</html>
